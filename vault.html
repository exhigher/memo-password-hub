<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e74c3c">
<title>密码管理器</title>
<style>
:root {
  --primary: #e74c3c; --primary-dark: #c0392b;
  --bg: #f5f6f8; --card: #ffffff; --text: #2c3e50;
  --text-light: #7f8c8d; --border: #e8e8e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 14px;
  --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  padding: max(16px, var(--safe-top)) 12px max(24px, var(--safe-bottom));
  -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--primary); font-size: 14px; text-decoration: none;
  margin-bottom: 8px; font-weight: 500;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding: 0 4px;
}
.header h1 { font-size: 24px; font-weight: 700; }
.add-btn-main {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none;
  font-size: 24px; cursor: pointer; box-shadow: 0 2px 8px rgba(231,76,60,0.3);
  display: flex; align-items: center; justify-content: center;
}
.add-btn-main:active { transform: scale(0.92); }
.search-box {
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; margin-bottom: 16px;
  background: var(--card); -webkit-appearance: none;
}
.search-box:focus { outline: none; border-color: var(--primary); }
.password-list { display: flex; flex-direction: column; gap: 10px; }
.pwd-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; border: 1px solid var(--border);
  box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s;
}
.pwd-card:active { transform: scale(0.98); }
.pwd-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.pwd-title { font-size: 16px; font-weight: 700; }
.pwd-actions { display: flex; gap: 8px; }
.pwd-action {
  width: 32px; height: 32px; border-radius: 8px;
  border: none; background: #f0f0f0; color: #555;
  font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.pwd-action:active { background: #e0e0e0; }
.pwd-field {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid #f0f0f0;
}
.pwd-field:last-child { border-bottom: none; }
.pwd-label { font-size: 12px; color: var(--text-light); width: 50px; flex-shrink: 0; }
.pwd-value {
  flex: 1; font-size: 14px; font-family: "SF Mono", monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pwd-value.hidden { filter: blur(4px); user-select: none; }
.pwd-copy {
  padding: 4px 10px; border-radius: 6px; border: none;
  background: var(--primary); color: #fff; font-size: 12px;
  font-weight: 600; cursor: pointer;
}
.pwd-copy:active { opacity: 0.85; }
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: none; justify-content: center; align-items: flex-end;
  z-index: 100; backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 20px max(24px, var(--safe-bottom));
  width: 100%; max-width: 480px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { margin: 0 0 14px 0; font-size: 18px; }
.modal input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; margin-bottom: 12px;
  -webkit-appearance: none;
}
.modal input:focus { outline: none; border-color: var(--primary); }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.modal-actions button {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 15px; cursor: pointer; font-weight: 600;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:active { opacity: 0.85; }
.btn-secondary { background: #f0f0f0; color: #555; }
.toast {
  position: fixed; bottom: max(80px, calc(var(--safe-bottom) + 60px));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
  border-radius: 10px; font-size: 13px; opacity: 0;
  transition: all 0.3s; pointer-events: none; z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.user-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding: 10px 14px;
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.user-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-light); }
.user-name { font-weight: 600; color: var(--text); }
.logout-btn {
  padding: 5px 12px; border-radius: 8px; border: none;
  background: #f0f0f0; color: #666; font-size: 12px; font-weight: 600; cursor: pointer;
}
.show-all-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 12px;
  font-weight: 600; cursor: pointer; margin-bottom: 12px;
}
.show-all-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
</style>
</head>
<body>

<a href="./index.html" class="back-btn">‹ 返回工具箱</a>

<div class="user-bar">
  <div class="user-info">
    <span>👤 <span class="user-name" id="userName">加载中...</span></span>
  </div>
  <button class="logout-btn" onclick="doLogout()">退出</button>
</div>

<div class="header">
  <h1>密码管理器</h1>
  <button class="add-btn-main" onclick="openModal()">+</button>
</div>

<input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索网站或用户名..." oninput="renderList()">

<button class="show-all-btn" id="showAllBtn" onclick="toggleShowAll()">👁 显示全部密码</button>

<div class="password-list" id="passwordList"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">添加密码</h3>
    <input type="text" id="siteInput" placeholder="网站名称（如：GitHub）">
    <input type="text" id="urlInput" placeholder="网址（可选）">
    <input type="text" id="usernameInput" placeholder="用户名/账号">
    <input type="text" id="passwordInput" placeholder="密码">
    <input type="text" id="noteInput" placeholder="备注（可选）">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="savePassword()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 统一账号系统 ====================
const AUTH_KEY = 'toolbox_auth';

function getAuth() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    return saved ? JSON.parse(saved) : null;
  } catch(e) { return null; }
}

function clearAuth() {
  localStorage.removeItem(AUTH_KEY);
}

// 检查登录状态，未登录跳回首页
const auth = getAuth();
if (!auth || !auth.user || !auth.pass) {
  window.location.href = './index.html';
}

// ==================== 密码管理器逻辑 ====================
let passwords = [], editingId = null, showAll = false;
const API_BASE = location.origin + '/api/vault';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

function init() {
  document.getElementById('userName').textContent = auth.user;
  loadFromCloud();
}

function doLogout() {
  clearAuth();
  window.location.href = './index.html';
}

async function loadFromCloud() {
  showToast('正在同步...');
  try {
    const res = await fetch(API_BASE + '?user=' + encodeURIComponent(auth.user) + '&pass=' + encodeURIComponent(auth.pass));
    if (!res.ok) throw new Error('服务器错误');
    const data = await res.json();
    if (data.passwords) { passwords = data.passwords; renderList(); showToast('同步成功'); }
    else { passwords = []; renderList(); showToast('开始添加密码吧'); }
  } catch(err) { showToast('同步失败: ' + err.message); console.error(err); }
}

async function saveToCloud() {
  try {
    await fetch(API_BASE, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: auth.user, pass: auth.pass, passwords: passwords })
    });
  } catch(err) { console.error('Save error:', err); }
}

function toggleShowAll() {
  showAll = !showAll;
  document.getElementById('showAllBtn').classList.toggle('active', showAll);
  document.getElementById('showAllBtn').textContent = showAll ? '🙈 隐藏密码' : '👁 显示全部密码';
  renderList();
}

function renderList() {
  const list = document.getElementById('passwordList');
  const query = document.getElementById('searchBox').value.toLowerCase();
  const filtered = passwords.filter(p =>
    (p.site && p.site.toLowerCase().includes(query)) ||
    (p.username && p.username.toLowerCase().includes(query)) ||
    (p.url && p.url.toLowerCase().includes(query))
  );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔐</div><p>暂无密码记录<br>点击右上角 + 添加</p></div>';
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="pwd-card" onclick="editPassword('${p.id}')">
      <div class="pwd-header">
        <span class="pwd-title">${escapeHtml(p.site || '未命名')}</span>
        <div class="pwd-actions">
          <button class="pwd-action" onclick="event.stopPropagation();copyField('${p.id}','password')">📋</button>
          <button class="pwd-action" onclick="event.stopPropagation();deletePassword('${p.id}')" style="color:var(--primary)">🗑</button>
        </div>
      </div>
      ${p.url ? `<div class="pwd-field"><span class="pwd-label">网址</span><span class="pwd-value">${escapeHtml(p.url)}</span></div>` : ''}
      <div class="pwd-field"><span class="pwd-label">账号</span><span class="pwd-value">${escapeHtml(p.username || '')}</span><button class="pwd-copy" onclick="event.stopPropagation();copyField('${p.id}','username')">复制</button></div>
      <div class="pwd-field"><span class="pwd-label">密码</span><span class="pwd-value ${showAll ? '' : 'hidden'}" id="pwd-${p.id}">${escapeHtml(p.password || '')}</span><button class="pwd-copy" onclick="event.stopPropagation();togglePwd('${p.id}')">${showAll ? '隐藏' : '显示'}</button></div>
      ${p.note ? `<div class="pwd-field"><span class="pwd-label">备注</span><span class="pwd-value">${escapeHtml(p.note)}</span></div>` : ''}
    </div>
  `).join('');
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
}

function togglePwd(id) {
  const el = document.getElementById('pwd-' + id);
  if (el) el.classList.toggle('hidden');
}

function copyField(id, field) {
  const p = passwords.find(x => x.id === id);
  if (!p) return;
  const val = p[field] || '';
  navigator.clipboard.writeText(val).then(() => showToast('已复制'));
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '添加密码';
  document.getElementById('siteInput').value = '';
  document.getElementById('urlInput').value = '';
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('noteInput').value = '';
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('siteInput').focus(), 100);
}

function editPassword(id) {
  const p = passwords.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑密码';
  document.getElementById('siteInput').value = p.site || '';
  document.getElementById('urlInput').value = p.url || '';
  document.getElementById('usernameInput').value = p.username || '';
  document.getElementById('passwordInput').value = p.password || '';
  document.getElementById('noteInput').value = p.note || '';
  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); editingId = null; }

function savePassword() {
  const site = document.getElementById('siteInput').value.trim();
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!site || !username || !password) { showToast('请填写网站、账号和密码'); return; }
  const entry = {
    id: editingId || generateId(),
    site: site,
    url: document.getElementById('urlInput').value.trim(),
    username: username,
    password: password,
    note: document.getElementById('noteInput').value.trim(),
    updated: Date.now()
  };
  if (editingId) {
    const idx = passwords.findIndex(x => x.id === editingId);
    if (idx >= 0) passwords[idx] = entry;
    showToast('已修改');
  } else {
    passwords.push(entry);
    showToast('已添加');
  }
  closeModal(); renderList(); saveToCloud();
}

function deletePassword(id) {
  if (!confirm('确定删除这条密码记录？')) return;
  passwords = passwords.filter(x => x.id !== id);
  renderList(); showToast('已删除'); saveToCloud();
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
document.body.addEventListener('touchmove', function(e) { if (e.target.closest('.modal')) return; if (document.getElementById('modal').classList.contains('active')) e.preventDefault(); }, { passive: false });
init();
</script>
</body>
</html>
