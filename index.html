<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2c3e50">
<title>我的工具箱</title>
<style>
:root {
  --bg: #f5f6f8; --card: #ffffff; --text: #2c3e50;
  --text-light: #7f8c8d; --border: #e8e8e8;
  --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 20px;
  --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; color: var(--text);
  padding: max(40px, var(--safe-top)) 20px max(40px, var(--safe-bottom));
  display: flex; flex-direction: column; align-items: center;
  -webkit-font-smoothing: antialiased;
}
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-size: 32px; color: #fff; font-weight: 700; margin-bottom: 8px; }
.header p { font-size: 15px; color: rgba(255,255,255,0.8); }
.tools-grid {
  display: grid; grid-template-columns: 1fr; gap: 16px;
  width: 100%; max-width: 400px;
}
.tool-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px 24px; text-decoration: none; color: var(--text);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  transition: all 0.3s; display: flex; align-items: center; gap: 16px;
  cursor: pointer;
}
.tool-card:hover, .tool-card:active { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.tool-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
/* 工具颜色配置 - 添加新工具时在这里加样式 */
.tool-card.calendar .tool-icon { background: linear-gradient(135deg, #3498db, #2980b9); }
.tool-card.vault .tool-icon { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.tool-card.notes .tool-icon { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.tool-card.todo .tool-icon { background: linear-gradient(135deg, #f39c12, #e67e22); }

.tool-info h3 { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.tool-info p { font-size: 12px; color: var(--text-light); line-height: 1.4; }
.arrow { margin-left: auto; font-size: 20px; color: var(--text-light); }

.add-tool-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  border: 2px dashed rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7); font-size: 14px; text-align: center;
  cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.add-tool-btn:active { background: rgba(255,255,255,0.2); }

.footer {
  margin-top: auto; padding-top: 40px;
  text-align: center; color: rgba(255,255,255,0.5);
  font-size: 11px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 我的工具箱</h1>
  <p>安全、便捷的个人工具集合</p>
</div>

<div class="tools-grid" id="toolsGrid">
  <!-- 
    ============================================
    添加新工具的接口说明：

    只需复制下面的模板，修改内容即可：

    <a href="./你的页面.html" class="tool-card 分类名">
      <div class="tool-icon">🎨</div>
      <div class="tool-info">
        <h3>工具名称</h3>
        <p>工具描述</p>
      </div>
      <span class="arrow">›</span>
    </a>

    然后在 <style> 里添加对应的颜色：
    .tool-card.分类名 .tool-icon { background: linear-gradient(135deg, #主色, #辅色); }
    ============================================
  -->

  <!-- 工具 1: 备忘录日历 -->
  <a href="./calendar.html" class="tool-card calendar">
    <div class="tool-icon">📅</div>
    <div class="tool-info">
      <h3>备忘录日历</h3>
      <p>记录日程、设置优先级、多设备同步</p>
    </div>
    <span class="arrow">›</span>
  </a>

  <!-- 工具 2: 密码管理器 -->
  <a href="./vault.html" class="tool-card vault">
    <div class="tool-icon">🔐</div>
    <div class="tool-info">
      <h3>密码管理器</h3>
      <p>安全存储密码、自动填充、加密保护</p>
    </div>
    <span class="arrow">›</span>
  </a>

  <!-- 
    预留接口：添加新工具的位置
    示例（已注释掉）：
  -->
  <!--
  <a href="./notes.html" class="tool-card notes">
    <div class="tool-icon">📝</div>
    <div class="tool-info">
      <h3>便签笔记</h3>
      <p>快速记录想法、支持Markdown</p>
    </div>
    <span class="arrow">›</span>
  </a>

  <a href="./todo.html" class="tool-card todo">
    <div class="tool-icon">✅</div>
    <div class="tool-info">
      <h3>待办清单</h3>
      <p>任务管理、进度追踪、提醒功能</p>
    </div>
    <span class="arrow">›</span>
  </a>
  -->
</div>

<div class="footer">
  <p>所有数据端到端加密，服务器无法读取</p>
</div>

</body>
</html>
