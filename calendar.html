<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#3498db">
<title>备忘录日历</title>
<style>
:root {
  --urgent: #e74c3c; --important: #f39c12; --normal: #3498db; --low: #95a5a6;
  --bg: #f5f6f8; --card: #ffffff; --text: #2c3e50; --text-light: #7f8c8d;
  --border: #e8e8e8; --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 14px;
  --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  padding: max(16px, var(--safe-top)) 12px max(24px, var(--safe-bottom));
  -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--normal); font-size: 14px; text-decoration: none;
  margin-bottom: 8px; font-weight: 500;
}
.app-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding: 0 4px;
}
.month-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.nav-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.nav-btn:active { transform: scale(0.92); }
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
  margin-bottom: 8px;
}
.weekday { text-align: center; font-weight: 600; color: var(--text-light); font-size: 12px; padding: 8px 0; }
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.day-cell {
  background: var(--card); border-radius: var(--radius); padding: 6px 4px 4px;
  min-height: 90px; border: 1px solid var(--border); transition: all 0.15s;
  display: flex; flex-direction: column; box-shadow: var(--shadow);
}
.day-cell:active { transform: scale(0.97); }
.day-cell.today { border-color: var(--normal); background: #f0f8ff; box-shadow: 0 0 0 2px rgba(52,152,219,0.15), var(--shadow); }
.day-cell.other-month { opacity: 0.35; }
.day-cell.weekend .day-num { color: var(--urgent); }
.day-num { font-weight: 700; font-size: 14px; margin-bottom: 3px; padding-left: 4px; }
.day-cell.today .day-num { color: var(--normal); }
.task-list { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; }
.task-item {
  font-size: 10px; padding: 2px 5px; border-radius: 5px; color: #fff;
  cursor: pointer; display: flex; align-items: center;
  word-break: break-all; line-height: 1.25; min-height: 20px;
}
.task-item:active { opacity: 0.7; }
.task-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 14px; height: 14px; background: rgba(255,255,255,0.25);
  border-radius: 3px; font-size: 9px; font-weight: 700; margin-right: 4px; flex-shrink: 0;
}
.task-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-item .del {
  opacity: 0; transition: opacity 0.2s; font-size: 10px; margin-left: 3px;
  flex-shrink: 0; width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center; border-radius: 4px;
}
.task-item:hover .del, .task-item:active .del { opacity: 1; }
.add-btn {
  width: 100%; margin-top: 3px; padding: 2px; border: 1px dashed #ddd;
  border-radius: 5px; background: transparent; color: #bbb; font-size: 10px;
  cursor: pointer; transition: all 0.2s;
}
.add-btn:active { border-color: var(--normal); color: var(--normal); background: rgba(52,152,219,0.05); }
.legend {
  display: flex; gap: 12px; margin-top: 16px; padding: 12px;
  background: var(--card); border-radius: var(--radius); justify-content: center;
  flex-wrap: wrap; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.user-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding: 10px 14px;
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.user-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-light); }
.user-name { font-weight: 600; color: var(--text); }
.logout-btn {
  padding: 5px 12px; border-radius: 8px; border: none;
  background: #f0f0f0; color: #666; font-size: 12px; font-weight: 600; cursor: pointer;
}
.logout-btn:active { background: #e0e0e0; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: none; justify-content: center; align-items: flex-end;
  z-index: 100; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 20px max(24px, var(--safe-bottom));
  width: 100%; max-width: 480px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { margin: 0 0 14px 0; color: var(--text); font-size: 18px; }
.modal input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; margin-bottom: 12px;
  -webkit-appearance: none;
}
.modal input:focus { outline: none; border-color: var(--normal); }
.priority-options { display: flex; gap: 8px; margin-bottom: 16px; }
.priority-btn {
  flex: 1; padding: 10px 4px; border: 2px solid transparent;
  border-radius: 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; color: #fff; transition: all 0.15s;
}
.priority-btn:active { transform: scale(0.95); }
.priority-btn.selected { box-shadow: 0 0 0 2px var(--text); }
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 15px; cursor: pointer; font-weight: 600; -webkit-appearance: none;
}
.btn-primary { background: var(--normal); color: #fff; }
.btn-primary:active { opacity: 0.85; }
.btn-secondary { background: #f0f0f0; color: #555; }
.btn-secondary:active { background: #e0e0e0; }
.toast {
  position: fixed; bottom: max(80px, calc(var(--safe-bottom) + 60px));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
  border-radius: 10px; font-size: 13px; opacity: 0;
  transition: all 0.3s; pointer-events: none; z-index: 200; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<a href="./index.html" class="back-btn">‹ 返回工具箱</a>

<div class="user-bar">
  <div class="user-info">
    <span>👤 <span class="user-name" id="userName">加载中...</span></span>
  </div>
  <button class="logout-btn" onclick="doLogout()">退出</button>
</div>

<div class="app-header">
  <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
  <div class="month-title" id="monthTitle"></div>
  <button class="nav-btn" onclick="changeMonth(1)">▶</button>
</div>

<div class="weekdays">
  <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
  <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
</div>

<div class="days-grid" id="daysGrid"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--urgent)"></div>紧急</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--important)"></div>重要</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--normal)"></div>普通</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--low)"></div>备忘</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">添加事项</h3>
    <input type="text" id="taskInput" placeholder="输入要做的事情..." onkeydown="if(event.key==='Enter')saveTask()">
    <div class="priority-options">
      <button class="priority-btn" style="background:var(--urgent)" data-p="urgent" onclick="selectP(this)">紧急</button>
      <button class="priority-btn" style="background:var(--important)" data-p="important" onclick="selectP(this)">重要</button>
      <button class="priority-btn selected" style="background:var(--normal)" data-p="normal" onclick="selectP(this)">普通</button>
      <button class="priority-btn" style="background:var(--low)" data-p="low" onclick="selectP(this)">备忘</button>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 统一账号系统 ====================
const AUTH_KEY = 'toolbox_auth';

function getAuth() {
  try {
    const saved = localStorage.getItem(AUTH_KEY);
    return saved ? JSON.parse(saved) : null;
  } catch(e) { return null; }
}

function clearAuth() {
  localStorage.removeItem(AUTH_KEY);
}

// 检查登录状态，未登录跳回首页
const auth = getAuth();
if (!auth || !auth.user || !auth.pass) {
  window.location.href = './index.html';
}

// ==================== 日历逻辑 ====================
let currentDate = new Date();
let selectedDateKey = null, selectedPriority = 'normal', editingIdx = null;
let tasks = {};
const colors = { urgent: '#e74c3c', important: '#f39c12', normal: '#3498db', low: '#95a5a6' };
const API_BASE = location.origin + '/api/data';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function init() {
  document.getElementById('userName').textContent = auth.user;
  loadFromCloud();
}

function doLogout() {
  clearAuth();
  window.location.href = './index.html';
}

async function loadFromCloud() {
  showToast('正在同步...');
  try {
    const res = await fetch(API_BASE + '?user=' + encodeURIComponent(auth.user) + '&pass=' + encodeURIComponent(auth.pass));
    if (!res.ok) throw new Error('服务器错误');
    const data = await res.json();
    if (data.tasks) { tasks = data.tasks; renderCalendar(); showToast('同步成功'); }
    else { tasks = {}; renderCalendar(); showToast('开始记录吧'); }
  } catch(err) { showToast('同步失败: ' + err.message); console.error(err); }
}

async function saveToCloud() {
  try {
    await fetch(API_BASE, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: auth.user, pass: auth.pass, tasks: tasks })
    });
  } catch(err) { console.error('Save error:', err); }
}

function changeMonth(delta) { currentDate.setMonth(currentDate.getMonth() + delta); renderCalendar(); }

function renderCalendar() {
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = year + '年 ' + (month + 1) + '月';
  const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
  const firstDay = new Date(year, month, 1), lastDay = new Date(year, month + 1, 0);
  const startOffset = firstDay.getDay(), totalDays = lastDay.getDate();
  const prevLastDay = new Date(year, month, 0).getDate(), today = new Date();
  for (let i = startOffset - 1; i >= 0; i--) grid.appendChild(createDayCell(year, month - 1, prevLastDay - i, true));
  for (let d = 1; d <= totalDays; d++) {
    const cell = createDayCell(year, month, d, false);
    if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) cell.classList.add('today');
    if (new Date(year, month, d).getDay() === 0 || new Date(year, month, d).getDay() === 6) cell.classList.add('weekend');
    grid.appendChild(cell);
  }
  const remaining = (7 - ((startOffset + totalDays) % 7)) % 7;
  for (let d = 1; d <= remaining; d++) grid.appendChild(createDayCell(year, month + 1, d, true));
}

function createDayCell(year, month, day, otherMonth) {
  const key = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
  const cell = document.createElement('div');
  cell.className = 'day-cell' + (otherMonth ? ' other-month' : '');
  cell.innerHTML = '<div class="day-num">' + day + '</div><div class="task-list" id="tl-' + key + '"></div><button class="add-btn" onclick="openModal(&quot;' + key + '&quot;)">+ 添加</button>';
  const list = cell.querySelector('#tl-' + key);
  if (tasks[key]) {
    tasks[key].forEach(function(t, idx) {
      const item = document.createElement('div');
      item.className = 'task-item'; item.style.background = colors[t.priority];
      item.innerHTML = '<span class="task-num">' + (idx + 1) + '</span><span class="task-text">' + escapeHtml(t.text) + '</span><span class="del" onclick="deleteTask(&quot;' + key + '&quot;,' + idx + ',event)">✕</span>';
      item.onclick = function(e) { if (e.target.classList.contains('del')) return; editTask(key, idx); };
      list.appendChild(item);
    });
  }
  return cell;
}

function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

function openModal(key) {
  selectedDateKey = key; editingIdx = null;
  document.getElementById('modalTitle').textContent = key + ' 添加事项';
  document.getElementById('taskInput').value = '';
  document.querySelectorAll('.priority-btn').forEach(function(b) { b.classList.toggle('selected', b.dataset.p === 'normal'); });
  selectedPriority = 'normal'; document.getElementById('modal').classList.add('active');
  setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
}

function editTask(key, idx) {
  selectedDateKey = key; editingIdx = idx; const t = tasks[key][idx];
  document.getElementById('modalTitle').textContent = key + ' 编辑事项';
  document.getElementById('taskInput').value = t.text;
  document.querySelectorAll('.priority-btn').forEach(function(b) { b.classList.toggle('selected', b.dataset.p === t.priority); });
  selectedPriority = t.priority; document.getElementById('modal').classList.add('active');
  setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
}

function closeModal() { document.getElementById('modal').classList.remove('active'); editingIdx = null; }

function selectP(btn) {
  document.querySelectorAll('.priority-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected'); selectedPriority = btn.dataset.p;
}

function saveTask() {
  const text = document.getElementById('taskInput').value.trim();
  if (!text) { showToast('请输入内容'); return; }
  if (!tasks[selectedDateKey]) tasks[selectedDateKey] = [];
  if (editingIdx !== null) { tasks[selectedDateKey][editingIdx] = { text: text, priority: selectedPriority }; showToast('已修改'); }
  else { tasks[selectedDateKey].push({ text: text, priority: selectedPriority }); showToast('已添加'); }
  closeModal(); renderCalendar(); saveToCloud();
}

function deleteTask(key, idx, e) {
  e.stopPropagation(); tasks[key].splice(idx, 1);
  if (tasks[key].length === 0) delete tasks[key];
  renderCalendar(); showToast('已删除'); saveToCloud();
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === document.getElementById('modal')) closeModal(); });
document.body.addEventListener('touchmove', function(e) { if (e.target.closest('.modal')) return; if (document.getElementById('modal').classList.contains('active')) e.preventDefault(); }, { passive: false });
init();
</script>
</body>
</html>
